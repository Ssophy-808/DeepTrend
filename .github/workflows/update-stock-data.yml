name: Update stock data

on:
  workflow_dispatch:
  schedule:
    # 06:00/07:30/08:30 UTC = 14:00/15:30/16:30 Asia/Taipei, Monday to Friday.
    # Run multiple times after close because TWSE/TPEX/yfinance/chip data can arrive at different times.
    - cron: "0 6 * * 1-5"
    - cron: "30 7 * * 1-5"
    - cron: "30 8 * * 1-5"

permissions:
  contents: write

jobs:
  update-stock-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update chip data
        run: python update_chip.py

      - name: Generate latest stock analysis
        run: python main.py

      - name: Append stock analysis history
        run: python update_history.py

      - name: Update factor lead history
        run: python update_factor_lead_history.py

      - name: Refresh data if remote changed during run
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "Remote main changed during this workflow. Regenerating data on latest main."
            git reset --hard origin/main
            python update_chip.py
            python main.py
            python update_history.py
            python update_factor_lead_history.py
          fi

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update stock analysis data"
          file_pattern: chip.csv output/chip_daily.csv output/stock_analysis_result.xlsx output/stock_analysis_history.csv output/universe_analysis_result.xlsx output/factor_lead_history.csv

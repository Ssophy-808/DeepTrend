name: Keep Streamlit awake

on:
  workflow_dispatch:
  schedule:
    # Ping every 6 hours so Streamlit Community Cloud is less likely to stay asleep.
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  keep-awake:
    runs-on: ubuntu-latest

    steps:
      - name: Wake DeepTrend Streamlit app
        continue-on-error: true
        timeout-minutes: 8
        run: |
          APP_URL="https://deeptrend-zdvlvdt3nx73pvfbr7cp6i.streamlit.app/"

          echo "Waking DeepTrend Streamlit app..."
          STATUS_CODE=$(curl -L --silent --show-error \
            --retry 8 --retry-delay 20 --retry-all-errors --connect-timeout 30 --max-time 240 \
            --output /tmp/deeptrend_keepalive.html \
            --write-out "%{http_code}" \
            "${APP_URL}" || true)

          echo "DeepTrend keepalive HTTP status: ${STATUS_CODE}"
          test -s /tmp/deeptrend_keepalive.html && head -c 500 /tmp/deeptrend_keepalive.html || true
          echo "Keep-awake finished. Transient Streamlit wake-up errors are ignored by design."
